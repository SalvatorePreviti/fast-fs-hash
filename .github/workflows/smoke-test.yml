# Smoke test — install fast-fs-hash from npm and verify it works on all platforms.
#
# Triggered manually. Installs the specified version (including rc/pre-release)
# with optional dependencies and runs a standalone smoke test script that
# exercises xxHash, LZ4, and FileHashCache through the native binding.

name: Smoke Test

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Package version to install (leave empty for version from package.json, or: 0.0.1, 0.0.1-rc1, latest)"
        required: false
        default: ""
        type: string

jobs:
  resolve-version:
    name: Resolve version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.ver.outputs.version }}
    steps:
      - uses: actions/checkout@v6
        with:
          sparse-checkout: package.json
      - id: ver
        run: |
          input='${{ inputs.version }}'
          if [ -z "$input" ]; then
            input=$(node -p "require('./package.json').version")
            echo "Defaulting to package.json version: ${input}"
          fi
          echo "version=${input}" >> "$GITHUB_OUTPUT"

  smoke:
    name: ${{ matrix.name }}
    needs: [resolve-version]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Windows
          - name: win32-x64
            os: windows-latest

          # macOS
          - name: darwin-arm64
            os: macos-latest
          - name: darwin-x64
            os: macos-latest
            arch: x64

          # Linux glibc
          - name: linux-x64-gnu
            os: ubuntu-24.04
          - name: linux-arm64-gnu
            os: ubuntu-24.04
            use-docker: true
            use-qemu: true
            docker-platform: linux/arm64
            docker-image: node:24-bookworm

          # Linux musl
          - name: linux-x64-musl
            os: ubuntu-24.04
            use-docker: true
            docker-image: node:24-alpine
          - name: linux-arm64-musl
            os: ubuntu-24.04
            use-docker: true
            use-qemu: true
            docker-platform: linux/arm64
            docker-image: node:24-alpine

    steps:
      - uses: actions/checkout@v6
        with:
          sparse-checkout: test/smoke-test

      # Direct (non-Docker) platforms
      - uses: actions/setup-node@v6
        if: ${{ !matrix.use-docker && !matrix.arch }}
        with:
          node-version: "24"

      # x64 Node via Rosetta 2 (darwin-x64 on arm64 runner)
      - name: Ensure Rosetta 2 is available
        if: ${{ matrix.arch == 'x64' }}
        run: softwareupdate --install-rosetta --agree-to-license 2>/dev/null || true

      - uses: actions/setup-node@v6
        if: ${{ matrix.arch == 'x64' }}
        with:
          node-version: "24"
          architecture: x64

      - name: Install and test
        if: ${{ !matrix.use-docker }}
        shell: bash
        run: |
          cd test/smoke-test
          npm install "fast-fs-hash@${{ needs.resolve-version.outputs.version }}"
          node smoke-test.mjs

      # QEMU for cross-arch Docker
      - name: Set up QEMU
        if: ${{ matrix.use-qemu }}
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      # Docker platforms (musl + arm64 glibc)
      - name: Install and test (Docker)
        if: ${{ matrix.use-docker }}
        run: |
          docker run --rm ${{ matrix.docker-platform && format('--platform {0}', matrix.docker-platform) || '' }} \
            -v "$PWD/test/smoke-test:/smoke-test" -w /smoke-test ${{ matrix.docker-image }} sh -c '
            npm install "fast-fs-hash@${{ needs.resolve-version.outputs.version }}" &&
            node smoke-test.mjs
          '

  smoke-freebsd:
    name: freebsd-x64
    needs: [resolve-version]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          sparse-checkout: test/smoke-test

      - name: Install and test in FreeBSD VM
        uses: cross-platform-actions/action@v0.32.0
        with:
          operating_system: freebsd
          version: "14.3"
          architecture: x86_64
          memory: 4G
          cpu_count: 2
          shell: bash
          run: |
            sudo pkg install -y node22 npm-node22
            cd test/smoke-test
            npm install "fast-fs-hash@${{ needs.resolve-version.outputs.version }}"
            node smoke-test.mjs
